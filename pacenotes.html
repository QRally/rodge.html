<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pacenotes Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #ffcc00;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --btn-bg: #2d2d2d;
            --handwriting: 'Architects Daughter', cursive;
        }

        body { font-family: sans-serif; background: var(--dark-bg); color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app-interface { width: 100%; max-width: 440px; background: var(--card-bg); padding: 15px; border-radius: 24px; border: 1px solid #333; }
        
        #preview-window { 
            background: #000; border-radius: 15px; min-height: 100px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--handwriting); color: var(--yellow); padding: 15px; text-align: center;
            border: 2px solid #333; position: relative;
        }
        #speedometer { font-size: 0.8rem; color: #444; position: absolute; top: 8px; font-family: sans-serif; }
        #display-text { font-size: 2rem; margin-top: 10px; }

        .grid { display: grid; gap: 8px; margin-bottom: 10px; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }
        .cols-6 { grid-template-columns: repeat(6, 1fr); }

        /* Utility Row Fix */
        .footer-grid { display: flex; justify-content: space-between; gap: 5px; margin-top: 10px; }
        .btn-util { flex: 1; font-size: 0.65rem; padding: 12px 2px; border: none; border-radius: 8px; font-weight: bold; min-width: 0; text-align: center; }

        button { cursor: pointer; transition: 0.1s; touch-action: manipulation; border-radius: 12px; font-weight: bold; color: white; border: 1px solid #444; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-dir { border: 2px solid var(--yellow); color: var(--yellow); background: var(--btn-bg); height: 65px; font-size: 1.6rem; }
        .btn-num { background: var(--btn-bg); height: 55px; font-size: 1.2rem; }
        
        /* Fixed Description Button Styling */
        .btn-desc { 
            background: #333; color: #bbb; min-height: 55px; font-size: 0.8rem; 
            display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.1;
        }
        .btn-sym { color: var(--yellow) !important; font-size: 1.4rem !important; }
        .btn-dist { background: var(--yellow); color: black; border: none; height: 60px; font-size: 1.3rem; }

        /* PRINT STYLES */
        @media print {
            #app-interface { display: none !important; }
            #print-area { display: block !important; font-family: var(--handwriting); }
            .note-grid { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 2px solid black; }
            .note-box { height: 140px; border-bottom: 2px solid black; border-right: 1px solid #eee; text-align: center; display: flex; flex-direction: column; justify-content: center; font-size: 18pt; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

<div id="app-interface">
    <div class="grid"><input type="text" id="stage-name" placeholder="STAGE NAME / NO." style="background:#000; color:var(--yellow); border:1px solid #444; padding:12px; border-radius:10px; font-family:var(--handwriting); font-size:1.2rem;"></div>

    <div id="preview-window">
        <div id="speedometer">GPS: OFF</div>
        <span id="display-text">...</span>
        <span id="log-counter" style="font-size:0.7rem; color:#555; margin-top:5px;">0 CALLS RECORDED</span>
    </div>

    <div class="grid cols-2">
        <button class="btn-dir" onclick="tap('L')">L</button>
        <button class="btn-dir" onclick="tap('R')">R</button>
    </div>

    <div class="grid cols-6">
        <button class="btn-num" onclick="tap('6')">6</button><button class="btn-num" onclick="tap('5')">5</button>
        <button class="btn-num" onclick="tap('4')">4</button><button class="btn-num" onclick="tap('3')">3</button>
        <button class="btn-num" onclick="tap('2')">2</button><button class="btn-num" onclick="tap('1')">1</button>
    </div>

    <div class="grid cols-4">
        <button class="btn-desc" onclick="tap('Crest')">Crest</button>
        <button class="btn-desc" onclick="tap('Into')">Into</button>
        <button class="btn-desc btn-sym" onclick="tap('>')">></button>
        <button class="btn-desc btn-sym" onclick="tap('<')"><</button>
        <button class="btn-desc" onclick="tap('D.Cut')">D.Cut</button>
        <button class="btn-desc" onclick="tap('Jump')">Jump</button>
        <button class="btn-desc" onclick="tap('Slippy')">Slippy</button>
        <button class="btn-desc" onclick="tap('Care')">Care</button>
    </div>

    <div class="grid cols-4">
        <button class="btn-dist" onclick="tap('50', true)">50</button>
        <button class="btn-dist" onclick="tap('100', true)">100</button>
        <button class="btn-dist" onclick="tap('200', true)">200</button>
        <button class="btn-dist" onclick="tap('300', true)">300</button>
    </div>

    <div class="footer-grid">
        <button class="btn-util" style="background:#422; color:#f99" onclick="undo()">UNDO</button>
        <button class="btn-util" id="recce-btn" style="background:#424; color:#f9f" onclick="toggleRecceMode()">RECCE</button>
        <button class="btn-util" style="background:#555; color:#fff" onclick="clearStage()">CLEAR</button>
        <button class="btn-util" style="background:#224; color:#99f" onclick="downloadBackup()">TXT</button>
        <button class="btn-util" style="background:#242; color:#9f9" onclick="doPrint()">PRINT</button>
    </div>

    <div style="margin-top:15px; padding-top:10px; border-top:1px solid #333; text-align:center; font-size:0.65rem; color:#666;">
        QRally Pacenotes by RODGE | Build v1.0.8
    </div>
</div>

<div id="print-area">
    <div style="display:flex; justify-content:space-between; border-bottom:2px solid black; padding-bottom:5px; margin-bottom:20px;">
        <h1 id="print-title" style="margin:0;">STAGE NOTES</h1>
        <span id="print-date"></span>
    </div>
    <div id="print-rows" class="note-grid"></div>
</div>

<script>
    let currentBuffer = []; let savedNotes = []; let watchID = null;

    function tap(val, isFinal = false) {
        currentBuffer.push(val);
        if (isFinal) { save(); } else { updateDisplay(); }
    }

    function updateDisplay() {
        document.getElementById('display-text').innerText = currentBuffer.length > 0 ? currentBuffer.join(" ") : "...";
    }

    function save() {
        if (currentBuffer.length === 0) return;
        savedNotes.push(currentBuffer.join(" "));
        currentBuffer = []; updateDisplay();
        document.getElementById('log-counter').innerText = `${savedNotes.length} CALLS RECORDED`;
    }

    function toggleRecceMode() {
        const speedEl = document.getElementById('speedometer');
        const btn = document.getElementById('recce-btn');
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition((pos) => {
                    if (pos.coords.speed !== null) {
                        const mph = Math.round(pos.coords.speed * 2.237);
                        speedEl.innerText = `SPEED: ${mph} MPH`;
                        speedEl.style.color = "var(--yellow)";
                    }
                }, null, { enableHighAccuracy: true });
                btn.style.boxShadow = "0 0 10px #f9f";
            }
        } else {
            navigator.geolocation.clearWatch(watchID); watchID = null;
            speedEl.innerText = "GPS: OFF"; speedEl.style.color = "#444";
            btn.style.boxShadow = "none";
        }
    }

    function undo() {
        if (currentBuffer.length > 0) { currentBuffer.pop(); } 
        else if (savedNotes.length > 0) { currentBuffer = savedNotes.pop().split(" "); }
        updateDisplay();
    }

    function clearStage() { if(confirm("Clear stage?")) { savedNotes = []; currentBuffer = []; updateDisplay(); } }

    function downloadBackup() {
        const name = document.getElementById('stage-name').value || 'stage-notes';
        const blob = new Blob([savedNotes.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `${name}.txt`; a.click();
    }

    function doPrint() {
        if (currentBuffer.length > 0) save();
        document.getElementById('print-date').innerText = new Date().toLocaleDateString();
        const container = document.getElementById('print-rows');
        container.innerHTML = "";
        savedNotes.forEach(note => {
            const box = document.createElement('div'); box.className = 'note-box';
            box.innerText = note; container.appendChild(box);
        });
        window.print();
    }
</script>
</body>
</html>
