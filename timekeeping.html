<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rally Master v4.3</title>
    <style>
        :root { --bg: #000; --main: #ff3e3e; --accent: #ffcc00; --card: #1a1a1a; --freeze: #004400; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--main); margin: 0; padding: 15px; touch-action: manipulation; }
        
        /* Header Image Styles */
        .header-container {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        #freeze-zone {
            width: 100%; height: 25vh; border: 4px solid var(--main); border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 15px; background: #050000; cursor: pointer;
            transition: background 0.2s;
        }

        #freeze-zone.is-frozen {
            background: var(--freeze);
            border-color: #00ff00;
            color: #fff;
        }

        #current-time { font-size: 3.5rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        #ms { font-size: 1.5rem; opacity: 0.6; }

        #pending-box { background: var(--card); padding: 15px; border-radius: 12px; border: 2px solid var(--accent); margin-bottom: 20px; display: none; }
        .input-row { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        input { background: #000; border: 2px solid var(--accent); color: #fff; font-size: 2rem; padding: 10px; text-align: center; border-radius: 8px; width: 100%; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-save { flex: 2; background: var(--accent); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
        .btn-cancel { flex: 1; background: #444; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 1.2rem; color: #fff; }
        .car-num { color: var(--accent); font-weight: bold; }

        .tools { display: flex; gap: 10px; margin-top: 30px; padding-bottom: 50px; }
        .btn-tool { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-clear { background: #333; color: #ff3e3e; border: 1px solid #ff3e3e; }
        .btn-view { background: #1a1a1a; color: #00ff00; border: 1px solid #00ff00; }

        #data-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; 
        }
        #data-text { width: 100%; height: 70%; background: #111; color: #00ff00; font-family: monospace; padding: 10px; border: 1px solid #333; }
        .overlay-btns { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://files.websitebuilder.prositehosting.co.uk/09/1c/091c8f4e-9e40-4553-94c3-1928cc468d6f.png" alt="Rally Header" class="header-image">
    </div>

    <div id="freeze-zone" onclick="freezeTime()">
        <div id="current-time">00:00:00</div>
        <div id="ms">.000</div>
    </div>

    <div id="pending-box">
        <div style="color: var(--accent); text-align: center; font-weight: bold; font-size: 1.2rem;">
            FROZEN: <span id="frozen-display"></span>
        </div>
        <div class="input-row">
            <input type="number" id="car-input" placeholder="CAR #" inputmode="numeric">
            <div class="btn-group">
                <button class="btn-cancel" onclick="cancelEntry()">CANCEL</button>
                <button class="btn-save" onclick="saveEntry()">SAVE ENTRY</button>
            </div>
        </div>
    </div>

    <table id="results-table"></table>

    <div class="tools">
        <button class="btn-tool btn-clear" onclick="clearLog()">Clear</button>
        <button class="btn-tool btn-view" onclick="showData()">View Data</button>
    </div>

    <div id="data-overlay">
        <h2 style="color: #00ff00;">Raw Data (CSV)</h2>
        <textarea id="data-text" readonly></textarea>
        <div class="overlay-btns">
            <button class="btn-tool" style="background: #444; color: #fff;" onclick="closeOverlay()">Close</button>
            <button class="btn-tool" style="background: #00ff00; color: #000;" onclick="copyToClipboard()">Copy All</button>
        </div>
    </div>

    <script>
        let isFrozen = false;
        let lastTime = "";

        function updateClock() {
            if (isFrozen) return;
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            const msStr = "." + String(now.getMilliseconds()).padStart(3, '0');
            document.getElementById('current-time').innerText = timeStr;
            document.getElementById('ms').innerText = msStr;
        }
        setInterval(updateClock, 10);

        function freezeTime() {
            if (isFrozen) return;
            isFrozen = true;
            lastTime = document.getElementById('current-time').innerText + document.getElementById('ms').innerText;
            document.getElementById('freeze-zone').classList.add('is-frozen');
            document.getElementById('frozen-display').innerText = lastTime;
            document.getElementById('pending-box').style.display = 'block';
            document.getElementById('car-input').focus();
        }

        function saveEntry() {
            const car = document.getElementById('car-input').value;
            if (!car) return;
            const row = document.getElementById('results-table').insertRow(0);
            row.innerHTML = `<td class="car-num">#${car}</td><td style="text-align:right">${lastTime}</td>`;
            resetUI();
        }

        function cancelEntry() { resetUI(); }

        function resetUI() {
            isFrozen = false;
            document.getElementById('car-input').value = "";
            document.getElementById('pending-box').style.display = 'none';
            document.getElementById('freeze-zone').classList.remove('is-frozen');
        }

        function clearLog() {
            if (confirm("Delete all data?")) document.getElementById('results-table').innerHTML = "";
        }

        function showData() {
            let csv = "Car,Time\n";
            document.querySelectorAll("#results-table tr").forEach(row => {
                const cols = row.querySelectorAll("td");
                csv += `${cols[0].innerText.replace('#','')},${cols[1].innerText}\n`;
            });
            document.getElementById('data-text').value = csv;
            document.getElementById('data-overlay').style.display = 'block';
        }

        function closeOverlay() { document.getElementById('data-overlay').style.display = 'none'; }

        function copyToClipboard() {
            const text = document.getElementById('data-text');
            text.select();
            document.execCommand('copy');
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
