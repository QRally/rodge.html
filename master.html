<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QRally Master</title>
    <style>
        :root {
            --rally-red: #ff3333;
            --rally-green: #33ff33;
            --rally-orange: #ff9900;
            --bg-black: #050505;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-black);
            color: var(--rally-red);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            /* Fix for hiding buttons: Use dvh (Dynamic Viewport Height) */
            height: 100dvh; 
            box-sizing: border-box;
            overflow: hidden;
        }

        .header { 
            display: flex; justify-content: space-between; align-items: baseline; 
            border-bottom: 2px solid var(--rally-red); padding-bottom: 4px; flex-shrink: 0;
        }
        .brand { font-size: 1rem; font-weight: 900; letter-spacing: 1px; color: white; }
        #clock { font-size: 1.8rem; font-weight: bold; color: var(--rally-red); }

        .trip-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-top: 6px;
            padding: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-shrink: 0;
        }
        .trip-val { font-size: 2.5rem; font-weight: 900; color: #fff; text-align: center; line-height: 1; }
        .trip-sub { font-size: 0.6rem; color: #888; text-align: center; text-transform: uppercase; }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            border-radius: 8px;
            margin-top: 6px;
            padding: 8px;
            flex: 1; /* These panels will now share the middle space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 0.65rem; color: #666; font-weight: bold; }
        
        input {
            background: #000; border: 1px solid var(--rally-red);
            color: #fff; font-size: 1.1rem; width: 70px; text-align: center;
        }
        
        textarea { 
            width: 100%; height: 35px; background: #000; border: 1px solid #333;
            color: var(--rally-orange); font-size: 0.9rem; padding: 4px; resize: none;
        }

        .big-display { font-size: clamp(2.5rem, 14vh, 4.5rem); text-align: center; font-weight: 900; line-height: 1; }

        .safe { color: var(--rally-green); text-shadow: 0 0 10px var(--rally-green); }
        .warning { color: #fff !important; background: var(--rally-red) !important; border-radius: 5px; }

        .btn-group { 
            display: flex; gap: 8px; margin-top: 8px; flex-shrink: 0; 
            padding-bottom: env(safe-area-inset-bottom); /* iOS support */
        }
        .btn { flex: 1; border: none; padding: 14px; font-size: 1.1rem; font-weight: 900; border-radius: 8px; text-transform: uppercase; }
        .reset-btn { background: var(--rally-red); color: black; }
        .trip-btn { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">QRALLY MASTER</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="trip-panel">
        <div>
            <div id="trip-total" class="trip-val">0.00</div>
            <div class="trip-sub">SECTION MILES</div>
        </div>
        <div>
            <div id="speed" class="trip-val" style="color:var(--rally-orange)">0</div>
            <div class="trip-sub">CURRENT MPH</div>
        </div>
    </div>

    <div class="panel">
        <div class="row"><label>TARGET MILES</label><input type="number" id="miles" step="0.1" value="2.0"></div>
        <div id="hold-timer" class="big-display">00:00</div>
    </div>

    <div class="panel">
        <div class="row"><label>DUE TIME</label><input type="time" id="due-time"></div>
        <div id="lateness-display" class="big-display">00:00</div>
    </div>

    <div class="panel" style="flex: 0.4;">
        <textarea id="notes" placeholder="NEXT JCT..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn trip-btn" onclick="resetTrip()">RESET TRIP</button>
        <button class="btn reset-btn" onclick="fullReset()">DEPART</button>
    </div>

    <script>
        let sectionStartTime = new Date();
        let totalDistance = 0;
        let lastCoord = null;

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const c = pos.coords;
                document.getElementById('speed').innerText = c.speed ? Math.round(c.speed * 2.23694) : 0;
                if (lastCoord && c.accuracy < 25) {
                    const d = calculateDistance(lastCoord.lat, lastCoord.lon, c.latitude, c.longitude);
                    totalDistance += d;
                    document.getElementById('trip-total').innerText = totalDistance.toFixed(2);
                }
                lastCoord = { lat: c.latitude, lon: c.longitude };
            }, null, { enableHighAccuracy: true });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
            const m = parseFloat(document.getElementById('miles').value) || 0;
            const rem = Math.ceil(((m / 30) * 3600) - ((now - sectionStartTime) / 1000));
            const hEl = document.getElementById('hold-timer');
            hEl.innerText = rem > 0 ? format(rem) : "CLEAR";
            hEl.className = rem > 0 ? "big-display" : "big-display safe";

            const due = document.getElementById('due-time').value;
            if (due) {
                const [h, min] = due.split(':');
                const dt = new Date(); dt.setHours(h, min, 0);
                const diff = Math.floor((now - dt) / 1000);
                const lEl = document.getElementById('lateness-display');
                if (diff > 0) {
                    lEl.innerText = `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}`;
                    lEl.parentElement.classList.toggle('warning', diff >= 1800);
                } else { lEl.innerText = "00:00"; lEl.parentElement.classList.remove('warning'); }
            }
        }

        function format(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
        function resetTrip() { totalDistance = 0; document.getElementById('trip-total').innerText = "0.00"; }
        function fullReset() { if(confirm("DEPART?")) { sectionStartTime = new Date(); resetTrip(); document.getElementById('notes').value = ""; } }
        setInterval(update, 1000);
    </script>
</body>
</html>
