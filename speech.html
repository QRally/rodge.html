<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pro</title>
    <style>
        body { 
            background: #1a1a1a; color: #ffcc00; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; min-height: 100vh; margin: 0;
            user-select: none; -webkit-user-select: none;
        }
        .voice-card { 
            background: #222; border: 2px solid #333; border-radius: 16px; 
            padding: 25px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #transcript-display { 
            background: #000; color: #fff; min-height: 120px; padding: 15px; 
            margin: 20px 0; border-radius: 12px; border: 1px solid #444; 
            font-style: italic; overflow-y: auto; text-align: left;
            font-size: 1.1rem; line-height: 1.4;
        }
        .ptt-btn { 
            width: 150px; height: 150px; border-radius: 50%; border: 6px solid #333;
            background: #444; color: white; font-weight: bold; font-size: 1.2rem;
            transition: all 0.1s ease; cursor: pointer;
            -webkit-tap-highlight-color: transparent; outline: none;
        }
        .ptt-btn.active { 
            background: #ff0000; border-color: #ff6666;
            transform: scale(0.94); box-shadow: 0 0 50px #ff0000;
        }
        .status-text { font-size: 0.9rem; color: #888; margin-top: 20px; font-weight: bold; letter-spacing: 1px; }
        #history-list { width: 95%; max-width: 420px; margin-top: 20px; }
        .note-item { 
            background: #262626; margin-bottom: 10px; padding: 15px; border-radius: 8px; 
            border-left: 5px solid #ffcc00; color: #eee; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .copy-btn { background: #444; color: #ffcc00; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="voice-card">
        <h1 style="margin: 0 0 10px 0; font-size: 1.8rem;">QRALLY PRO</h1>
        <div id="transcript-display">Press and hold to record...</div>
        
        <button id="mic-btn" class="ptt-btn">PUSH<br>TO TALK</button>
        
        <div class="status-text" id="status">STATUS: READY</div>
    </div>

    <div id="history-list"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const display = document.getElementById('transcript-display');
        const status = document.getElementById('status');
        const historyList = document.getElementById('history-list');

        let isListening = false;
        let savedNotes = JSON.parse(localStorage.getItem('qrally_notes')) || [];

        // Setup API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            status.innerText = "ERROR: BROWSER NOT SUPPORTED";
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        // Function to trigger on touch/click
        const startVoice = async (e) => {
            if (e) e.preventDefault();
            if (isListening) return;

            // Try to resume AudioContext if browser suspended it
            if (window.AudioContext) {
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') ctx.resume();
            }

            isListening = true;
            micBtn.classList.add('active');
            status.innerText = "STATUS: LISTENING...";
            status.style.color = "#ff4d4d";
            display.innerText = "";

            try {
                recognition.start();
                if (navigator.vibrate) navigator.vibrate(50);
            } catch (err) {
                console.log("Start error:", err);
            }
        };

        const stopVoice = (e) => {
            if (e) e.preventDefault();
            if (!isListening) return;

            isListening = false;
            micBtn.classList.remove('active');
            status.innerText = "STATUS: PROCESSING...";
            status.style.color = "#ffcc00";
            recognition.stop();
        };

        // UI Event Listeners
        micBtn.addEventListener('mousedown', startVoice);
        window.addEventListener('mouseup', stopVoice);
        micBtn.addEventListener('touchstart', startVoice, {passive: false});
        micBtn.addEventListener('touchend', stopVoice, {passive: false});

        // The key fix for results
        recognition.onresult = (event) => {
            let finalStr = '';
            for (let i = 0; i < event.results.length; i++) {
                finalStr += event.results[i][0].transcript;
            }
            display.innerText = finalStr;
        };

        recognition.onerror = (event) => {
            status.innerText = "API ERROR: " + event.error.toUpperCase();
            console.error(event.error);
        };

        recognition.onend = () => {
            const text = display.innerText.trim();
            if (text && text !== "Press and hold to record...") {
                saveNote(text);
            }
            
            if (!isListening) {
                status.innerText = "STATUS: READY";
                status.style.color = "#888";
                display.innerText = "Press and hold to record...";
            }
        };

        function saveNote(text) {
            savedNotes.push(text);
            localStorage.setItem('qrally_notes', JSON.stringify(savedNotes));
            renderNotes();
        }

        function renderNotes() {
            historyList.innerHTML = '';
            [...savedNotes].reverse().forEach((note) => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerHTML = `<span>${note}</span> <button class="copy-btn">COPY</button>`;
                div.querySelector('.copy-btn').onclick = () => {
                    navigator.clipboard.writeText(note);
                    status.innerText = "COPIED!";
                    setTimeout(() => status.innerText = "STATUS: READY", 1000);
                };
                historyList.appendChild(div);
            });
        }

        renderNotes();
    </script>
</body>
</html>
