<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pro - Final</title>
    <style>
        body { background: #1a1a1a; color: #ffcc00; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        .voice-card { background: #222; border: 2px solid #333; border-radius: 20px; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
        #transcript-display { background: #000; color: #fff; min-height: 100px; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #444; font-size: 1.1rem; text-align: left; }
        .ptt-btn { 
            width: 140px; height: 140px; border-radius: 50%; border: none; background: #444; color: white; font-weight: bold; 
            cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; transition: 0.2s;
        }
        .ptt-btn.active { background: #ff0000; animation: pulse-ring 1.2s infinite; box-shadow: 0 0 20px #ff0000; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); } 50% { transform: scale(1.02); } 100% { transform: scale(0.95); } }
        .status-text { font-size: 0.85rem; color: #888; margin-top: 15px; }
        #history-list { width: 95%; max-width: 420px; margin-top: 20px; }
        .note-item { background: #262626; margin-bottom: 10px; padding: 12px; border-radius: 8px; border-left: 4px solid #ffcc00; color: #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 5px; }
        .copy-btn { background: #333; color: #ffcc00; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .del-btn { background: #442222; color: #ff4444; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="voice-card">
        <h2>QRALLY PRO</h2>
        <div id="transcript-display">Hold to speak...</div>
        <button id="mic-btn" class="ptt-btn">PUSH TO TALK</button>
        <div class="status-text" id="status">System: Ready</div>
    </div>
    <div id="history-list"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const display = document.getElementById('transcript-display');
        const status = document.getElementById('status');
        const historyList = document.getElementById('history-list');

        let isPressed = false;
        let savedNotes = JSON.parse(localStorage.getItem('qrally_notes')) || [];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        const startUI = (e) => {
            if (e) e.preventDefault();
            if (isPressed) return;
            isPressed = true;
            micBtn.classList.add('active');
            status.innerText = "System: LISTENING...";
            display.innerText = "";
            try { recognition.start(); if (navigator.vibrate) navigator.vibrate(40); } catch (err) {}
        };

        const stopUI = (e) => {
            if (e) e.preventDefault();
            if (!isPressed) return;
            isPressed = false;
            micBtn.classList.remove('active');
            status.innerText = "System: Ready";
            recognition.stop();
        };

        micBtn.addEventListener('mousedown', startUI);
        window.addEventListener('mouseup', stopUI);
        micBtn.addEventListener('touchstart', startUI, {passive: false});
        micBtn.addEventListener('touchend', stopUI, {passive: false});

        // THE FIX: Only capture the most recent complete transcript
        recognition.onresult = (event) => {
            let final_transcript = '';
            let interim_transcript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    final_transcript += event.results[i][0].transcript;
                } else {
                    interim_transcript += event.results[i][0].transcript;
                }
            }
            // Display final + interim to make it feel real-time without doubling
            display.innerText = final_transcript + interim_transcript;
            status.innerText = "System: RECEIVING VOICE...";
        };

        recognition.onend = () => {
            const final = display.innerText.trim();
            if (final && final !== "Hold to speak...") {
                savedNotes.push(final);
                localStorage.setItem('qrally_notes', JSON.stringify(savedNotes));
                render();
            }
            if (!isPressed) display.innerText = "Hold to speak...";
        };

        window.deleteNote = (index) => {
            savedNotes.splice(index, 1);
            localStorage.setItem('qrally_notes', JSON.stringify(savedNotes));
            render();
        };

        function render() {
            historyList.innerHTML = savedNotes.map((n, i) => `
                <div class="note-item">
                    <span>${n}</span>
                    <div class="btn-group">
                        <button class="copy-btn" onclick="navigator.clipboard.writeText('${n.replace(/'/g, "\\'")}')">COPY</button>
                        <button class="del-btn" onclick="deleteNote(${i})">DEL</button>
                    </div>
                </div>
            `).reverse().join('');
        }
        render();
    </script>
</body>
</html>
