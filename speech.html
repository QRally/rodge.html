<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>QRally Dictate</title>
    <style>
        :root { --rally-yellow: #ffd700; --rally-red: #ff3b30; --rally-bg: #121212; --card-bg: #1e1e1e; }
        
        body { 
            background: var(--rally-bg); color: var(--rally-yellow); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; min-height: 100vh; margin: 0;
            user-select: none; -webkit-user-select: none;
        }

        .voice-card { 
            background: var(--card-bg); border: 2px solid #333; border-radius: 24px; 
            padding: 25px; width: 95%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        #stage-name { 
            width: 100%; background: #000; color: var(--rally-yellow); border: 1px solid #444; 
            padding: 14px; border-radius: 12px; font-weight: bold; text-align: center;
            margin-bottom: 15px; box-sizing: border-box; font-size: 1.1rem; text-transform: uppercase;
        }

        #transcript-display { 
            background: #000; color: #fff; min-height: 110px; padding: 15px; 
            margin: 15px 0; border-radius: 12px; border: 1px solid #444; 
            font-style: italic; font-size: 1.1rem; text-align: left; line-height: 1.4;
            display: flex; align-items: center; justify-content: center;
        }

        .ptt-btn { 
            width: 160px; height: 160px; border-radius: 50%; border: 8px solid #333;
            background: #2a2a2a; color: white; font-weight: 900; font-size: 1.3rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); transition: transform 0.1s;
        }

        .ptt-btn.active { 
            background: var(--rally-red); border-color: #ff6b6b;
            animation: pulse-ring 1.2s infinite linear;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
            100% { transform: scale(0.96); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .status-text { font-size: 0.85rem; color: #888; margin-top: 20px; font-weight: bold; letter-spacing: 1.5px; }

        .top-controls { width: 95%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .button-row { display: flex; gap: 8px; justify-content: center; width: 100%; }

        #history-list { width: 95%; max-width: 420px; margin-top: 20px; padding-bottom: 40px; }
        .note-item { 
            background: #222; margin-bottom: 12px; padding: 16px; border-radius: 12px; 
            border-left: 6px solid var(--rally-yellow); color: #eee;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-group { display: flex; gap: 6px; justify-content: flex-end; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: active 0.1s; }
        
        .play-btn { background: #007bff; color: white; padding: 8px 14px; font-size: 0.75rem; }
        .share-btn { background: #25D366; color: white; padding: 8px 14px; font-size: 0.75rem; }
        .copy-btn { background: #3d3d3d; color: var(--rally-yellow); padding: 8px 14px; font-size: 0.75rem; }
        .del-btn { background: #4b1a1a; color: #ff6b6b; padding: 8px 14px; font-size: 0.75rem; }
        
        .read-all-btn { background: #007bff; color: white; padding: 12px 20px; border-radius: 25px; font-size: 0.85rem; flex: 1; }
        .share-all-btn { background: #25D366; color: white; padding: 12px 20px; border-radius: 25px; font-size: 0.85rem; flex: 1; }
        .save-btn { background: #555; color: white; padding: 12px 15px; border-radius: 25px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="voice-card">
        <h2 style="letter-spacing: 3px; margin: 0 0 15px 0; color: white;">QRALLY <span style="color:var(--rally-yellow)">DICTATE</span></h2>
        <input type="text" id="stage-name" placeholder="STAGE NAME (e.g. SS4 PANZERPLATTE)" />
        <div id="transcript-display">READY TO RECORD</div>
        <button id="mic-btn" class="ptt-btn">DICTATE</button>
        <div class="status-text" id="status">STATUS: STANDBY</div>
    </div>

    <div class="top-controls" id="control-bar" style="display:none;">
        <div class="button-row">
            <button onclick="readAllNotes()" class="read-all-btn">LISTEN ALL</button>
            <button onclick="shareAllWhatsApp()" class="share-all-btn">SEND (WA)</button>
            <button onclick="downloadNotes()" class="save-btn">TXT</button>
        </div>
        <button onclick="clearAll()" style="color:#666; background:none; text-decoration:underline; font-size:0.75rem; margin-top:5px;">ERASE ALL DATA</button>
    </div>

    <div id="history-list"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const display = document.getElementById('transcript-display');
        const status = document.getElementById('status');
        const historyList = document.getElementById('history-list');
        const stageInput = document.getElementById('stage-name');
        const controlBar = document.getElementById('control-bar');

        let isPressed = false;
        let savedNotes = JSON.parse(localStorage.getItem('qrally_dictate_notes')) || [];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-GB';

        const speak = (text) => {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const ukVoice = voices.find(v => v.lang.includes('GB') || v.lang === 'en-GB');
            if (ukVoice) utterance.voice = ukVoice;
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        };

        const startAction = (e) => {
            if (e) e.preventDefault();
            if (isPressed) return;
            isPressed = true;
            micBtn.classList.add('active');
            status.innerText = "STATUS: LISTENING";
            display.innerText = "";
            try { recognition.start(); if (navigator.vibrate) navigator.vibrate(50); } catch(err) {}
        };

        const stopAction = (e) => {
            if (e) e.preventDefault();
            if (!isPressed) return;
            isPressed = false;
            micBtn.classList.remove('active');
            status.innerText = "STATUS: STANDBY";
            recognition.stop();
        };

        micBtn.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction);
        micBtn.addEventListener('touchstart', startAction, {passive: false});
        micBtn.addEventListener('touchend', stopAction, {passive: false});

        recognition.onresult = (event) => {
            let finalStr = '';
            let interimStr = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) finalStr += event.results[i][0].transcript;
                else interimStr += event.results[i][0].transcript;
            }
            display.innerText = finalStr + interimStr;
        };

        recognition.onend = () => {
            const result = display.innerText.trim();
            if (result && result !== "READY TO RECORD") {
                savedNotes.push(result);
                localStorage.setItem('qrally_dictate_notes', JSON.stringify(savedNotes));
                render();
            }
            if (!isPressed) display.innerText = "READY TO RECORD";
        };

        window.deleteNote = (i) => {
            savedNotes.splice(i, 1);
            localStorage.setItem('qrally_dictate_notes', JSON.stringify(savedNotes));
            render();
        };

        window.clearAll = () => {
            if (confirm("Permanently erase all notes for this stage?")) {
                savedNotes = [];
                localStorage.removeItem('qrally_dictate_notes');
                render();
            }
        };

        window.shareWhatsApp = (t) => {
            window.open(`https://wa.me/?text=${encodeURIComponent("QRally Dictate: " + t)}`, '_blank');
        };

        window.shareAllWhatsApp = () => {
            if (!savedNotes.length) return;
            const stage = stageInput.value.trim() || "QRALLY STAGE";
            let msg = `*${stage.toUpperCase()} DICTATION*\n\n`;
            savedNotes.forEach((n, i) => msg += `${i+1}. ${n}\n`);
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.readAllNotes = () => {
            if (!savedNotes.length) return;
            speak(`Dictation summary for ${stageInput.value || 'the current stage'}. ` + savedNotes.join(". "));
        };

        window.downloadNotes = () => {
            if (!savedNotes.length) return;
            const stage = stageInput.value.trim() || "QRally_Dictation";
            let content = `QRALLY DICTATE - ${stage.toUpperCase()}\n\n`;
            savedNotes.forEach((n, i) => content += `${i+1}. ${n}\n`);
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${stage.replace(/\s+/g, '_')}.txt`;
            a.click();
        };

        function render() {
            controlBar.style.display = savedNotes.length > 0 ? 'flex' : 'none';
            historyList.innerHTML = savedNotes.map((n, i) => {
                const s = n.replace(/'/g, "\\'");
                return `
                <div class="note-item">
                    <div style="font-weight: 500;">${n}</div>
                    <div class="btn-group">
                        <button class="play-btn" onclick="speak('${s}')">PLAY</button>
                        <button class="share-btn" onclick="shareWhatsApp('${s}')">WA</button>
                        <button class="copy-btn" onclick="navigator.clipboard.writeText('${s}')">COPY</button>
                        <button class="del-btn" onclick="deleteNote(${i})">DEL</button>
                    </div>
                </div>`;
            }).reverse().join('');
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        render();
    </script>
</body>
</html>
