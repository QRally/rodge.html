<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pro - Fix</title>
    <style>
        body { 
            background: #1a1a1a; color: #ffcc00; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; min-height: 100vh; margin: 0;
            user-select: none; -webkit-user-select: none;
        }
        .voice-card { 
            background: #222; border: 2px solid #333; border-radius: 16px; 
            padding: 25px; width: 90%; max-width: 400px; text-align: center;
        }
        #transcript-display { 
            background: #000; color: #fff; min-height: 100px; padding: 15px; 
            margin: 20px 0; border-radius: 12px; border: 1px solid #444; font-style: italic;
        }
        .ptt-btn { 
            width: 140px; height: 140px; border-radius: 50%; border: none;
            background: #444; color: white; font-weight: bold;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: 0.1s;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        
        /* Pulse Animation when active */
        .ptt-btn.active { 
            background: #ff0000; 
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 30px #ff0000; 
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        #status { font-size: 0.8rem; color: #888; margin-top: 15px; font-weight: bold; }
        #debug { color: #ff4444; font-size: 0.7rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="voice-card">
        <h2>QRALLY PRO</h2>
        <div id="transcript-display">Hold to speak...</div>
        <button id="mic-btn" class="ptt-btn">PUSH<br>TO TALK</button>
        <div id="status">System: Ready</div>
        <div id="debug"></div>
    </div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const display = document.getElementById('transcript-display');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let str = '';
                for (let i = 0; i < event.results.length; i++) {
                    str += event.results[i][0].transcript;
                }
                display.innerText = str;
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    debug.innerText = "CRITICAL: Mic blocked. Check browser settings.";
                }
                console.error("Speech Error:", event.error);
            };
        }

        const startProcess = async (e) => {
            e.preventDefault();
            debug.innerText = "";
            
            try {
                // FORCE permission check
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Stop the stream immediately, we just needed the permission
                stream.getTracks().forEach(track => track.stop());

                if (recognition) {
                    micBtn.classList.add('active');
                    status.innerText = "System: LISTENING...";
                    display.innerText = "";
                    recognition.start();
                }
            } catch (err) {
                debug.innerText = "Permission Denied: " + err.message;
                status.innerText = "System: ERROR";
            }
        };

        const stopProcess = (e) => {
            if (e) e.preventDefault();
            micBtn.classList.remove('active');
            if (recognition) {
                recognition.stop();
                status.innerText = "System: Ready";
            }
        };

        // Listeners
        micBtn.addEventListener('mousedown', startProcess);
        window.addEventListener('mouseup', stopProcess);
        micBtn.addEventListener('touchstart', startProcess);
        micBtn.addEventListener('touchend', stopProcess);
    </script>
</body>
</html>
