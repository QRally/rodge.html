<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cambrian Forresters Motor Club | Owners Section</title>
    <style>
        /* --- GLOBAL THEME --- */
        body {
            margin: 0; padding: 0; background: #0a0a0a; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
        }

        /* --- FIXED NAVIGATION & TICKER --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2001;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; box-sizing: border-box;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
        }
        .logo { font-size: 0.75rem; letter-spacing: 2px; font-weight: bold; line-height: 1.3; text-transform: uppercase; }
        .refresh-btn {
            font-size: 0.6rem; color: #ffd700; cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.5); padding: 6px 14px;
            border-radius: 4px; transition: 0.3s; text-transform: uppercase; font-weight: bold;
        }

        .ticker-wrap {
            position: fixed; top: 68px; left: 0; width: 100%; height: 32px;
            background: #ffd700; color: black; z-index: 2000;
            overflow: hidden; border-bottom: 2px solid #000;
            display: flex; align-items: center; 
        }
        .ticker-content {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: ticker 35s linear infinite;
            line-height: 32px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase;
        }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .ticker-item { display: inline-block; padding: 0 50px; }

        /* --- PAGE CONTENT (SPACING FIXED) --- */
        .page-section { 
            padding: 240px 20px 60px 20px; 
            max-width: 1200px; margin: 0 auto; text-align: center; 
        }
        .section-header { font-family: 'Courier New', monospace; font-size: 2rem; letter-spacing: 6px; margin-bottom: 10px; text-transform: uppercase; }
        .member-count { color: #ffd700; font-size: 0.9rem; letter-spacing: 3px; font-weight: bold; margin-bottom: 60px; text-transform: uppercase; }

        /* --- GARAGE GRID & CARDS --- */
        .garage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .garage-card { height: 420px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .garage-card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; padding: 15px; box-sizing: border-box; border-radius: 4px; }
        .face-front img { width: 100%; height: 300px; object-fit: cover; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; color: #222; }
        .face-back { transform: rotateY(180deg); background: #eee; color: #222; display: flex; flex-direction: column; justify-content: center; text-align: center; }

        /* --- THE FIXED MODAL (V4.7) --- */
        #uploadModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999;
        }

        .modal-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111; 
            padding: 30px; 
            width: 90%; 
            max-width: 400px; 
            border: 2px solid #ffd700;
            border-radius: 8px;
            box-sizing: border-box;
            color: white;
        }

        /* Forces inputs to be full width and visible */
        .modal-content input, 
        .modal-content textarea {
            display: block;
            width: 100% !important; 
            background: #000 !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 12px !important;
            margin: 10px 0 20px 0 !important;
            box-sizing: border-box !important;
            font-family: inherit;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .close-x {
            position: absolute;
            top: 10px; right: 15px;
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">THE CAMBRIAN FORRESTERS<br>MOTOR CLUB</div>
        <div class="refresh-btn" onclick="resetStack()">RELOAD STACK</div>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker-content" id="event-ticker"></div>
    </div>

    <section class="page-section">
        <div class="section-header">OWNERS SECTION</div>
        <div id="member-counter" class="member-count"></div>

        <div style="margin: 0 auto 100px auto; width: 290px; height: 390px; background: #ffd700; color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);" onclick="toggleModal()">
             <h1 style="font-size: 4rem; margin: 0;">📸</h1>
             <h3 style="font-family: 'Courier New', monospace;">UPLOAD RIDE</h3>
             <p style="font-weight: bold;">CLICK TO SUBMIT</p>
        </div>

        <div class="garage-grid" id="main-garage"></div>
    </section>

    <div id="uploadModal">
        <div class="modal-content">
            <span class="close-x" onclick="toggleModal()">X</span>
            <h2 style="color:#ffd700; font-family:'Courier New', monospace; margin-top:0;">MEMBER SUBMISSION</h2>
            
            <form action="https://formspree.io/f/YOUR_ID" method="POST" enctype="multipart/form-data">
                <label style="font-size: 0.7rem; color: #ffd700;">NAME / INSTAGRAM</label>
                <input type="text" name="handle" required>
                
                <label style="font-size: 0.7rem; color: #ffd700;">CAR MODEL</label>
                <input type="text" name="car" required>
                
                <label style="font-size: 0.7rem; color: #ffd700;">MODIFICATIONS</label>
                <textarea name="mods" rows="3"></textarea>
                
                <label style="font-size: 0.7rem; color: #ffd700;">UPLOAD PHOTO</label>
                <input type="file" name="upload" accept="image/*" required>
                
                <button type="submit" class="btn-submit">SEND TO CLUB</button>
                <p onclick="toggleModal()" style="text-align: center; color: #666; cursor: pointer; margin-top: 15px; font-size: 0.8rem;">CANCEL</p>
            </form>
        </div>
    </div>

    <script>
        const clubEvents = ["🏁 NEXT MEET: FOREST RUN - MARCH 20TH", "📸 SUBMIT YOUR RIDE VIA THE YELLOW CARD ABOVE"];
        const memberData = [
            { name: "1967 CLASSIC MINI", img: "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=600", specs: ["1275CC", "ROLL CAGE"] }
        ];

        function init() {
            document.getElementById('event-ticker').innerHTML = clubEvents.map(e => `<span class="ticker-item">${e}</span>`).join('');
            const container = document.getElementById('main-garage');
            document.getElementById('member-counter').innerText = `${memberData.length} REGISTERED CLUB MEMBERS`;
            
            memberData.forEach(car => {
                container.innerHTML += `
                    <div class="garage-card" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner">
                            <div class="face face-front">
                                <img src="${car.img}">
                                <div class="card-footer"><p>${car.name}</p><span>TAP</span></div>
                            </div>
                            <div class="face face-back">
                                <h3>SPECS</h3>
                                <p>${car.specs.join('<br>')}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function toggleModal() {
            const m = document.getElementById('uploadModal');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }
        
        init();
    </script>
</body>
</html>
