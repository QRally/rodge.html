<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Log | Rally Notes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ffdb00; 
            --text-white: #ffffff;
            --text-muted: #888;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding-bottom: 50px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; font-style: italic; }
        .logo span { color: var(--accent); }

        .nav-buttons { display: flex; gap: 10px; }

        .btn {
            border: none;
            padding: 12px 20px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-pdf { background: #333; color: #fff; border: 1px solid #444; }
        .btn:active { transform: scale(0.95); }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .log-entry {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .event-name { font-size: 1.3rem; font-weight: 700; color: var(--accent); outline: none; }
        .date { color: var(--text-muted); font-size: 0.85rem; font-family: monospace; }
        .log-body p { font-size: 1.1rem; line-height: 1.6; color: #ddd; outline: none; min-height: 50px; }

        .tags { display: flex; gap: 8px; margin-top: 15px; }
        .tag {
            background: #333;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: -45px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* PDF Specific Styling - Removes delete buttons in PDF */
        @media print {
            .delete-btn { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">STAGE <span>LOG</span></div>
        <div class="nav-buttons">
            <button class="btn btn-pdf" onclick="exportToPDF()">Download PDF</button>
            <button class="btn btn-add" onclick="addNewStage()">+ New Stage</button>
        </div>
    </nav>

    <div class="container" id="log-container">
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadLogs);

        function addNewStage(data = null) {
            const container = document.getElementById('log-container');
            const now = new Date();
            const dateStr = data ? data.date : now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <button class="delete-btn" onclick="removeStage(this)">×</button>
                <div class="log-header">
                    <span class="event-name" contenteditable="true" oninput="saveLogs()">${data ? data.title : 'New Event Name'}</span>
                    <span class="date">${dateStr}</span>
                </div>
                <div class="log-body">
                    <p contenteditable="true" oninput="saveLogs()">${data ? data.content : 'Enter stage notes...'}</p>
                    <div class="tags">
                        <span class="tag" contenteditable="true" oninput="saveLogs()">${data ? data.tag : 'SURFACE'}</span>
                    </div>
                </div>
            `;
            container.prepend(logEntry);
            if (!data) saveLogs();
        }

        function removeStage(btn) {
            if(confirm("Delete this log entry?")) {
                btn.parentElement.remove();
                saveLogs();
            }
        }

        function saveLogs() {
            const logs = [];
            document.querySelectorAll('.log-entry').forEach(entry => {
                logs.push({
                    title: entry.querySelector('.event-name').innerText,
                    date: entry.querySelector('.date').innerText,
                    content: entry.querySelector('.log-body p').innerText,
                    tag: entry.querySelector('.tag').innerText
                });
            });
            localStorage.setItem('rallyLogs', JSON.stringify(logs));
        }

        function loadLogs() {
            const saved = localStorage.getItem('rallyLogs');
            if (saved) {
                const logs = JSON.parse(saved);
                logs.reverse().forEach(log => addNewStage(log));
            } else {
                addNewStage({
                    title: "Example: Forest Rally SS1",
                    date: "01 Mar 2026",
                    content: "The 107 handled the tight sections well. Watch ruts on pass 2.",
                    tag: "GRAVEL"
                });
            }
        }

        function exportToPDF() {
            const element = document.getElementById('log-container');
            const opt = {
                margin:       10,
                filename:     'Rally-Stage-Logs.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#0f0f0f' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Temporary hide delete buttons for clean PDF
            document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');
            
            html2pdf().set(opt).from(element).save().then(() => {
                // Restore delete buttons
                document.querySelectorAll('.delete-btn').forEach(b => b.style.display = '');
            });
        }
    </script>
</body>
</html>
