<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Log | RODGE</title>
    <link rel="icon" href="https://files.websitebuilder.prositehosting.co.uk/02/10/02108289-beff-440a-aa2a-6fcd4f767da3.png">
<link rel="apple-touch-icon" href="https://files.websitebuilder.prositehosting.co.uk/02/10/02108289-beff-440a-aa2a-6fcd4f767da3.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ffdb00; 
            --text-white: #ffffff;
            --text-muted: #888;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; font-style: italic; }
        .logo span { color: var(--accent); }

        .nav-buttons { display: flex; gap: 8px; }

        .btn {
            border: none;
            padding: 10px 16px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-pdf { background: #333; color: #fff; }
        .btn-clear { background: #442222; color: #ff9999; }
        .btn:hover { filter: brightness(1.2); }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            flex: 1;
        }

        .log-entry {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .event-name { font-size: 1.3rem; font-weight: 700; color: var(--accent); outline: none; }
        .date { color: var(--text-muted); font-size: 0.85rem; font-family: monospace; }
        .log-body p { font-size: 1.1rem; line-height: 1.6; color: #ddd; outline: none; min-height: 40px; }

        .tag {
            display: inline-block;
            background: #333;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: -35px;
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        footer strong { color: var(--accent); }

        @media (max-width: 900px) {
            .delete-btn { right: 10px; top: 10px; color: #666; }
            .nav-buttons { gap: 5px; }
            .btn { padding: 8px 10px; font-size: 0.65rem; }
        }

        @media print {
            .delete-btn, .btn, .navbar { display: none !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">STAGE <span>LOG</span></div>
        <div class="nav-buttons">
            <button class="btn btn-clear" onclick="clearAllLogs()">Clear</button>
            <button class="btn btn-pdf" onclick="exportToPDF()">PDF</button>
            <button class="btn btn-add" onclick="addNewStage()">+ Stage</button>
        </div>
    </nav>

    <div class="container" id="log-content">
        <div id="log-container">
            </div>
        
        <footer>
            Stage Log by <strong>RODGE</strong>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadLogs);

        function addNewStage(data = null) {
            const container = document.getElementById('log-container');
            const now = new Date();
            const dateStr = data ? data.date : now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <button class="delete-btn" onclick="removeStage(this)">×</button>
                <div class="log-header">
                    <span class="event-name" contenteditable="true" oninput="saveLogs()">${data ? data.title : 'Event Name'}</span>
                    <span class="date">${dateStr}</span>
                </div>
                <div class="log-body">
                    <p contenteditable="true" oninput="saveLogs()">${data ? data.content : 'Notes...'}</p>
                    <span class="tag" contenteditable="true" oninput="saveLogs()">${data ? data.tag : 'SURFACE'}</span>
                </div>
            `;
            container.prepend(logEntry);
            if (!data) saveLogs();
        }

        function removeStage(btn) {
            if(confirm("Remove this entry?")) {
                btn.parentElement.remove();
                saveLogs();
            }
        }

        function clearAllLogs() {
            if(confirm("ARE YOU SURE? This will wipe all current stage notes for a fresh event.")) {
                document.getElementById('log-container').innerHTML = '';
                localStorage.removeItem('rallyLogs');
                // Optional: add one fresh blank stage
                addNewStage();
            }
        }

        function saveLogs() {
            const logs = [];
            document.querySelectorAll('.log-entry').forEach(entry => {
                logs.push({
                    title: entry.querySelector('.event-name').innerText,
                    date: entry.querySelector('.date').innerText,
                    content: entry.querySelector('.log-body p').innerText,
                    tag: entry.querySelector('.tag').innerText
                });
            });
            localStorage.setItem('rallyLogs', JSON.stringify(logs));
        }

        function loadLogs() {
            const saved = localStorage.getItem('rallyLogs');
            if (saved) {
                const logs = JSON.parse(saved);
                logs.reverse().forEach(log => addNewStage(log));
            } else {
                addNewStage({
                    title: "Example Stage",
                    date: "01 Mar 2026",
                    content: "Notes here...",
                    tag: "TARMAC"
                });
            }
        }

        function exportToPDF() {
            const element = document.getElementById('log-content');
            const opt = {
                margin:       10,
                filename:     'Stage-Log-RODGE.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#0f0f0f' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            document.querySelectorAll('.delete-btn').forEach(b => b.style.visibility = 'hidden');
            html2pdf().set(opt).from(element).save().then(() => {
                document.querySelectorAll('.delete-btn').forEach(b => b.style.visibility = 'visible');
            });
        }
    </script>
</body>
</html>
