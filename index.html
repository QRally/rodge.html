<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>208 SPEC-R | MASTER TELEMETRY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --rally-red: #e30613; 
            --rally-yellow: #fde047; 
            --accent-color: var(--rally-yellow);
        }
        
        body { 
            background-color: #09090b; 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Removed vertical centering to eliminate top space */
            min-height: 100vh;
        }

        .aero-clip {
            position: relative;
            clip-path: polygon(0% 0%, 95% 0%, 100% 25%, 100% 100%, 5% 100%, 0% 75%);
            overflow: hidden;
            background: #000;
        }

        /* CRT Scanline Effect */
        .aero-clip::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            z-index: 10;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .slant-header {
            font-family: 'Archivo Black', sans-serif;
            transform: skewX(-12deg);
            font-size: clamp(2.5rem, 10vw, 6rem);
            line-height: 0.9;
        }

        .accent-text { color: var(--accent-color); transition: color 0.3s ease; }
        .accent-border { border-color: var(--accent-color); transition: border-color 0.3s ease; }
        .spec-r-highlight { color: var(--rally-red); }
        
        .shift-active { 
            border-color: var(--rally-red) !important; 
            box-shadow: 0 0 20px rgba(227, 6, 19, 0.4);
        }
    </style>
</head>
<body>

    <main class="w-full max-w-6xl px-6 pt-8 pb-12">
        <div class="grid lg:grid-cols-2 gap-12 items-center">
            
            <div class="flex flex-col">
                <h1 class="slant-header uppercase italic mb-6">
                  208<br>
                    <span class="spec-r-highlight">SPEC-R</span>
                </h1>
                
                <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-10 border-l-2 accent-border pl-4">
                    Chassis #1000000001 // R-Spec Firmware
                </p>

                <div id="tel-container" class="bg-black border border-white/10 p-5 aero-clip w-full max-w-md transition-all duration-75">
                    <div class="flex justify-between items-center mb-2 relative z-20">
                        <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Telemetry Feed</span>
                        <span id="live-rpm" class="accent-text font-mono text-sm font-bold">0 RPM</span>
                    </div>
                    <div class="h-32 relative z-20">
                        <canvas id="telemetryChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-center">
                <div class="w-full aspect-video bg-zinc-900 border border-white/5 overflow-hidden">
                    <img src="https://files.websitebuilder.prositehosting.co.uk/26/21/26218c14-5bee-48e5-9c34-588118cf7abe.png" alt="208 SPEC-R" class="w-full h-full object-cover opacity-90">
                </div>
            </div>

        </div>
    </main>

    <script>
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const telContainer = document.getElementById('tel-container');
        let rpmData = Array(40).fill(0);
        let peakData = Array(40).fill(0);
        let peakValue = 0;

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(40).fill(''),
                datasets: [
                    { 
                        data: rpmData, 
                        borderColor: '#fde047', 
                        borderWidth: 2, 
                        pointRadius: 0, 
                        fill: false, 
                        tension: 0 
                    },
                    { 
                        data: peakData, 
                        borderColor: 'rgba(227, 6, 19, 0.4)', 
                        borderWidth: 1, 
                        pointRadius: 0, 
                        fill: false, 
                        tension: 0,
                        borderDash: [3, 3]
                    }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                scales: { x: { display: false }, y: { display: false, min: 2000, max: 9500 } }, 
                animation: false
            }
        });

        setInterval(() => {
            const base = 6000;
            const jitter = (Math.random() - 0.5) * 5500;
            const val = Math.floor(base + jitter);

            if (val > peakValue) peakValue = val;
            else peakValue *= 0.992;

            if (val > 8200) {
                telContainer.classList.add('shift-active');
            } else {
                telContainer.classList.remove('shift-active');
            }

            rpmData.push(val); rpmData.shift();
            peakData.push(peakValue); peakData.shift();
            
            chart.update('none');
            document.getElementById('live-rpm').innerText = `${val} RPM`;
        }, 85);
    </script>
</body>
</html>
