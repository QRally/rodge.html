<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Log | RODGE</title>
    <link rel="icon" href="https://files.websitebuilder.prositehosting.co.uk/02/10/02108289-beff-440a-aa2a-6fcd4f767da3.png">
<link rel="apple-touch-icon" href="https://files.websitebuilder.prositehosting.co.uk/02/10/02108289-beff-440a-aa2a-6fcd4f767da3.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ffdb00; 
            --text-white: #ffffff;
            --text-muted: #888;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* UI Styling (Screen Only) */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.6rem; font-weight: 900; font-style: italic; }
        .logo span { color: var(--accent); }

        .btn { border: none; padding: 10px 16px; font-weight: 800; text-transform: uppercase; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-add { background: var(--accent); color: #000; }
        .btn-pdf { background: #333; color: #fff; }
        .btn-clear { background: #442222; color: #ff9999; margin-right: 5px; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; flex: 1; }

        .log-entry {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 25px; margin-bottom: 25px; position: relative;
        }

        .log-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .event-name { font-size: 1.3rem; font-weight: 700; color: var(--accent); outline: none; }
        .date { color: var(--text-muted); font-size: 0.85rem; }
        .log-body p { font-size: 1.1rem; color: #ddd; outline: none; }

        .tag { display: inline-block; background: #333; padding: 4px 12px; font-size: 0.7rem; border-radius: 50px; color: var(--text-muted); }

        footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        footer strong { color: var(--accent); }

        .delete-btn { position: absolute; top: 10px; right: -35px; background: none; border: none; color: #444; cursor: pointer; font-size: 1.2rem; }

        /* --- PDF INK SAVER OVERRIDES --- */
        .pdf-mode {
            background-color: white !important;
            color: black !important;
        }

        .pdf-mode .log-entry {
            background-color: white !important;
            border: 1px solid #000 !important;
            color: black !important;
        }

        .pdf-mode .event-name { color: #000 !important; border-bottom: 2px solid #000; }
        .pdf-mode .log-body p { color: #333 !important; }
        .pdf-mode .tag { border: 1px solid #000; background: none !important; color: #000 !important; }
        .pdf-mode footer { color: #000 !important; }
        .pdf-mode footer strong { color: #000 !important; }

        @media (max-width: 900px) { .delete-btn { right: 10px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">STAGE <span>LOG</span></div>
        <div>
            <button class="btn btn-clear" onclick="clearAllLogs()">Clear</button>
            <button class="btn btn-pdf" onclick="exportToPDF()">PDF</button>
            <button class="btn btn-add" onclick="addNewStage()">+ Stage</button>
        </div>
    </nav>

    <div class="container" id="log-content">
        <div id="log-container"></div>
        <footer>Stage Log by <strong>RODGE</strong></footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadLogs);

        function addNewStage(data = null) {
            const container = document.getElementById('log-container');
            const now = new Date();
            const dateStr = data ? data.date : now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <button class="delete-btn" onclick="removeStage(this)">×</button>
                <div class="log-header">
                    <span class="event-name" contenteditable="true" oninput="saveLogs()">${data ? data.title : 'Event Name'}</span>
                    <span class="date">${dateStr}</span>
                </div>
                <div class="log-body">
                    <p contenteditable="true" oninput="saveLogs()">${data ? data.content : 'Notes...'}</p>
                    <span class="tag" contenteditable="true" oninput="saveLogs()">${data ? data.tag : 'SURFACE'}</span>
                </div>
            `;
            container.prepend(logEntry);
            if (!data) saveLogs();
        }

        function removeStage(btn) {
            if(confirm("Remove this entry?")) { btn.parentElement.remove(); saveLogs(); }
        }

        function clearAllLogs() {
            if(confirm("ARE YOU SURE? This will wipe all notes.")) {
                document.getElementById('log-container').innerHTML = '';
                localStorage.removeItem('rallyLogs');
                addNewStage();
            }
        }

        function saveLogs() {
            const logs = [];
            document.querySelectorAll('.log-entry').forEach(entry => {
                logs.push({
                    title: entry.querySelector('.event-name').innerText,
                    date: entry.querySelector('.date').innerText,
                    content: entry.querySelector('.log-body p').innerText,
                    tag: entry.querySelector('.tag').innerText
                });
            });
            localStorage.setItem('rallyLogs', JSON.stringify(logs));
        }

        function loadLogs() {
            const saved = localStorage.getItem('rallyLogs');
            if (saved) {
                const logs = JSON.parse(saved);
                logs.reverse().forEach(log => addNewStage(log));
            } else {
                addNewStage({ title: "Bae Ceredigion", date: "02 Mar 2026", content: "Notes...", tag: "TARMAC" });
            }
        }

        function exportToPDF() {
            const element = document.getElementById('log-content');
            
            // 1. Apply Ink Saver Styles
            element.classList.add('pdf-mode');
            document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');

            const opt = {
                margin: 10,
                filename: 'Stage-Log-RODGE.pdf',
                html2canvas: { scale: 2, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                // 2. Remove Ink Saver Styles back to Dark Mode
                element.classList.remove('pdf-mode');
                document.querySelectorAll('.delete-btn').forEach(b => b.style.display = '');
            });
        }
    </script>
</body>
</html>
